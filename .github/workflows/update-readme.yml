name: Inject contents of todo.md into readme 

on:
  push:
    paths:
      - 'todo.md'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Insert todo.md into README.md
        run: |
          CONTENT=$(sed 's/[&/\]/\\&/g' todo.md)
          awk '/<!-- TODO-START -->/{print;system("cat todo.md");skip=1;next}/<!-- TODO-END -->/{skip=0} !skip' README.md > README.tmp
          mv README.tmp README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update README with todo.md" || echo "No changes"
          git push
