name: Build & Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      LAST_FM_API_KEY: ${{ secrets.LAST_FM_API_KEY }}

    steps:
      - name: Install base packages
        run: |
          pacman -Sy --noconfirm git base-devel sudo

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install yay
        run: |
          su builder -c "git clone https://aur.archlinux.org/yay.git"
          su builder -c "cd yay && makepkg -si --noconfirm"

      - name: Install Zola
        run: |
          su builder -c "yay -S --noconfirm zola"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fix permissions
        run: |
          chown -R builder:builder .

      - name: Build site
        run: |
          su builder -c "zola build"

      - name: Deploy to gh-pages branch
        run: |
          cd public

          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Deploy to gh-pages"

          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
