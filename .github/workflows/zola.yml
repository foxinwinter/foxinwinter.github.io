name: Build & Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Install base packages
        run: |
          pacman -Sy --noconfirm git base-devel sudo

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install yay
        run: |
          su builder -c "git clone https://aur.archlinux.org/yay.git"
          su builder -c "cd yay && makepkg -si --noconfirm"

      - name: Install Zola
        run: |
          su builder -c "yay -S --noconfirm zola"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fix permissions (important)
        run: |
          chown -R builder:builder .

      - name: Build site
        run: |
          su builder -c "zola build"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
